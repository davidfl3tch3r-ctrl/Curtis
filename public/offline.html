<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CURTIS — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F2;
      color: #1C1410;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1C1410; color: #F5F0E8; }
      .card { background: #241A14 !important; border-color: rgba(255,255,255,0.10) !important; }
      .muted { color: #8B7355 !important; }
    }

    .card {
      background: #FFFFFF;
      border-radius: 20px;
      border: 1.5px solid #EDE5D8;
      padding: 52px 40px 44px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #FF5A1F 0%, #E8400A 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(255,90,31,0.35);
      font-size: 18px;
      color: white;
    }

    .logo-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .signal {
      font-size: 52px;
      margin-bottom: 20px;
      line-height: 1;
    }

    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 14px;
      line-height: 1.65;
      color: #7A6650;
      margin-bottom: 28px;
    }

    .muted { color: #7A6650; }

    button {
      background: linear-gradient(135deg, #FF5A1F, #E8400A);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(255,90,31,0.3);
      letter-spacing: 0.01em;
    }

    button:active { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">◆</div>
      <div class="logo-text">CURTIS</div>
    </div>

    <div class="signal">📶</div>

    <h1>You're offline</h1>

    <p class="muted">
      No internet connection found.<br />
      Check your connection and try again.
    </p>

    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
